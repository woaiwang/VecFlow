  #     - uses: actions/checkout@v4
  #     - name: Check formatting
  #       run: |
  #         sudo apt-get install -y clang-format-15
  #         find include/ src/ tests/ -name "*.cpp" -o -name "*.hpp" \
  #           | xargs clang-format-15 --dry-run --Werror